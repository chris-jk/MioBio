<style>
  /* =========================================================
     THEME — tweak these to restyle the whole page
     ========================================================= */
  :root {
    --bg-0:      #0a0a0f;
    --accent-a:  #7c5cff;   /* purple */
    --accent-b:  #2dd4bf;   /* teal   */
    --text:      #f4f4f8;
    --text-dim:  #a0a0b2;
    --card:      rgba(255,255,255,0.04);
    --card-hov:  rgba(255,255,255,0.08);
    --border:    rgba(255,255,255,0.09);
    --radius:    16px;
    --maxw:      560px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    background: var(--bg-0);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Animated gradient glow behind everything */
  body::before {
    content: "";
    position: fixed;
    inset: -40vmax;
    z-index: -1;
    background:
      radial-gradient(40vmax 40vmax at 20% 10%, color-mix(in srgb, var(--accent-a) 35%, transparent), transparent 60%),
      radial-gradient(40vmax 40vmax at 85% 25%, color-mix(in srgb, var(--accent-b) 28%, transparent), transparent 60%),
      radial-gradient(50vmax 50vmax at 50% 100%, color-mix(in srgb, var(--accent-a) 22%, transparent), transparent 60%);
    filter: blur(20px);
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate3d(0,0,0) scale(1); }
    100% { transform: translate3d(0,-3%,0) scale(1.08); }
  }

  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: clamp(40px, 8vh, 88px) 20px 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ---------- Header / profile ---------- */
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    box-shadow: 0 0 0 4px var(--bg-0), 0 0 0 6px var(--border), 0 12px 40px rgba(124,92,255,0.35);
    overflow: hidden;
    user-select: none;
  }
  /* contain = whole photo is always visible, never cropped */
  .avatar img { width: 100%; height: 100%; object-fit: contain; display: block; }

  h1 {
    margin-top: 20px;
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .verified { color: var(--accent-b); vertical-align: middle; }

  .tagline {
    margin-top: 6px;
    color: var(--text-dim);
    font-size: 15px;
    max-width: 40ch;
  }

  /* ---------- Social icon row ---------- */
  .socials {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-top: 22px;
  }
  .social {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: 12px;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--border);
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .social:hover {
    transform: translateY(-3px);
    background: var(--card-hov);
    border-color: color-mix(in srgb, var(--accent-a) 50%, transparent);
  }
  .social svg { width: 22px; height: 22px; }

  /* ---------- Newsletter ---------- */
  .newsletter { width: 100%; margin-top: 30px; }
  .nl-card {
    position: relative;
    width: 100%;
    padding: 20px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    text-align: center;
    overflow: hidden;
  }
  .nl-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, color-mix(in srgb, var(--accent-a) 16%, transparent), color-mix(in srgb, var(--accent-b) 16%, transparent));
    opacity: .5;
  }
  .nl-card > * { position: relative; z-index: 1; }
  .nl-head { font-weight: 700; font-size: 17px; }
  .nl-sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .nl-form { display: flex; gap: 8px; margin-top: 14px; }
  .nl-input {
    flex: 1 1 auto;
    min-width: 0;
    padding: 11px 14px;
    border-radius: 999px;
    background: var(--bg-0);
    border: 1px solid var(--border);
    color: var(--text);
    font: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .15s ease;
  }
  .nl-input::placeholder { color: var(--text-dim); }
  .nl-input:focus { border-color: color-mix(in srgb, var(--accent-a) 60%, transparent); }
  .nl-btn {
    flex: 0 0 auto;
    padding: 11px 20px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font: inherit;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    transition: transform .15s ease, opacity .15s ease;
  }
  .nl-btn:hover { transform: translateY(-2px); }
  .nl-btn:disabled { opacity: .6; cursor: default; transform: none; }
  .nl-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
  .nl-msg.ok { color: var(--accent-b); }
  .nl-msg.err { color: #ff6b6b; }
  @media (max-width: 400px) { .nl-form { flex-direction: column; } .nl-btn { width: 100%; } }

  /* ---------- What's New ---------- */
  .card .icon.emoji {
    background: var(--card-hov);
    font-size: 25px;
    line-height: 1;
  }
  .card .tag {
    flex: 0 0 auto;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .3px;
    color: var(--accent-b);
    border: 1px solid color-mix(in srgb, var(--accent-b) 35%, transparent);
    border-radius: 999px;
    padding: 4px 10px;
    white-space: nowrap;
  }
  @media (max-width: 400px) { .card .tag { display: none; } }

  /* ---------- Link cards ---------- */
  .links {
    width: 100%;
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-label {
    align-self: flex-start;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 14px 0 2px 4px;
  }

  .card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 13px 15px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    text-align: left;
    transition: transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, color-mix(in srgb, var(--accent-a) 14%, transparent), color-mix(in srgb, var(--accent-b) 14%, transparent));
    opacity: 0;
    transition: opacity .2s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: color-mix(in srgb, var(--accent-a) 45%, transparent);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  .card:hover::before { opacity: 1; }
  .card > * { position: relative; z-index: 1; }

  .card .icon {
    flex: 0 0 52px;
    width: 52px;
    height: 52px;
    border-radius: 13px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    color: #fff;
    font-weight: 800;
    font-size: 20px;
    overflow: hidden;
  }
  .card .icon svg { width: 26px; height: 26px; }
  .card .icon img { width: 100%; height: 100%; object-fit: cover; display:block; }

  .card .meta { flex: 1 1 auto; min-width: 0; }
  .card .meta .title {
    font-weight: 600;
    font-size: 15.5px;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .meta .rating {
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 600;
    color: #ffd166;
    display: inline-flex;
    align-items: center;
    gap: 2px;
  }
  .card .meta .sub {
    font-size: 13px;
    color: var(--text-dim);
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* store chip on the right (App Store / Google Play) */
  .card .store {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 10px 5px 8px;
    transition: color .15s ease, border-color .15s ease;
  }
  .card .store svg { width: 14px; height: 14px; }
  .card:hover .store { color: var(--text); border-color: color-mix(in srgb, var(--accent-a) 45%, transparent); }
  .store-label { white-space: nowrap; }
  @media (max-width: 400px) { .store-label { display: none; } }

  /* ---------- Buy Me a Coffee ---------- */
  .coffee { margin-top: 34px; text-align: center; }
  .coffee img { height: 48px; width: auto; border-radius: 12px; transition: transform .15s ease, box-shadow .15s ease; }
  .coffee a:hover img { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,.35); }

  /* ---------- Footer ---------- */
  footer {
    margin-top: 40px;
    font-size: 13px;
    color: var(--text-dim);
  }
  footer a { color: var(--text-dim); text-decoration: underline; text-underline-offset: 2px; }

  @media (max-width: 420px) {
    .avatar { width: 104px; height: 104px; font-size: 34px; }
    h1 { font-size: 22px; }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
    * { transition: none !important; }
  }
</style>

  star:'<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>',
  apple:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.6c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.1-2.8.9-3.5.9s-1.8-.9-3-.8c-1.5 0-2.9.9-3.7 2.3-1.6 2.7-.4 6.8 1.1 9 .8 1.1 1.6 2.3 2.8 2.2 1.1 0 1.6-.7 2.9-.7s1.8.7 3 .7 2-1.1 2.7-2.1c.9-1.3 1.2-2.5 1.3-2.6-.1 0-2.5-1-2.5-3.7zM14.3 5.2c.6-.8 1-1.8.9-2.9-.9 0-2 .6-2.6 1.4-.6.7-1.1 1.7-1 2.7 1 .1 2-.5 2.7-1.2z"/></svg>',
  play:'<svg viewBox="0 0 24 24"><path fill="#34A853" d="M3.6 2.3 13.4 12 3.6 21.7c-.3-.2-.5-.6-.5-1.1V3.4c0-.5.2-.9.5-1.1z" opacity="0"/><path fill="currentColor" d="M3.6 2.3c-.3.3-.5.7-.5 1.2v17c0 .5.2.9.5 1.2L13.3 12 3.6 2.3zm12 6.4L5.9 3.1l8.9 5.1.8.5zm0 6.6-.8.5-8.9 5.1 9.7-5.6zm3.5-4.2-2.4-1.4-1.9 1.9 1.9 1.9 2.4-1.4c.7-.4.7-1.1 0-1.5z"/></svg>',
};
const icon = (name) => SVG[name] || SVG.web;
const $ = (id) => document.getElementById(id);

/* Detect platform once. iPad on iPadOS reports as Mac, so check touch. */
function detectPlatform() {
  const ua = navigator.userAgent || "";
  if (/Android/i.test(ua)) return "android";
  if (/iPhone|iPad|iPod/i.test(ua)) return "ios";
  if (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1) return "ios"; // iPadOS
  return "desktop";
}
const PLATFORM = detectPlatform();
function storeFor(app) {
  if (PLATFORM === "android") return { url: app.android, badge: "play",  label: "Google Play" };
  if (PLATFORM === "ios")     return { url: app.ios,     badge: "apple", label: "App Store" };
  // desktop → configured default
  return CONFIG.desktopDefaultStore === "android"
    ? { url: app.android, badge: "play",  label: "Google Play" }
    : { url: app.ios,     badge: "apple", label: "App Store" };
}

const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Profile
document.title = CONFIG.name + " — Apps & Links";
$("name").innerHTML = esc(CONFIG.name) + (CONFIG.verified
  ? ' <span class="verified" title="Verified"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2 9.6 4.2 6.4 4 5.7 7.2 2.8 8.9l1.4 3-1.4 3 2.9 1.7.7 3.2 3.2-.2L12 22l2.4-2.2 3.2.2.7-3.2 2.9-1.7-1.4-3 1.4-3-2.9-1.7L17.6 4l-3.2.2zm-1.3 13-3-3 1.4-1.4 1.6 1.6 3.9-3.9L16 9.7z"/></svg></span>'
  : '');
$("tagline").textContent = CONFIG.tagline;

const av = $("avatar");
if (CONFIG.avatarImage) {
  const img = document.createElement('img');
  img.src = CONFIG.avatarImage; img.alt = CONFIG.name;
  av.appendChild(img);
} else {
  av.textContent = CONFIG.avatarInitials;
}

// Socials
$("socials").innerHTML = CONFIG.socials.map(s =>
  `<a class="social" href="${esc(s.url)}" aria-label="${esc(s.label)}" title="${esc(s.label)}"${s.url.startsWith('mailto:') ? '' : ' target="_blank" rel="noopener"'}>${icon(s.icon)}</a>`
).join("");

// What's New
const up = CONFIG.updates;
if (up && up.enabled && (up.items || []).length) {
  const items = up.items.map(it => {
    const inner = `
      <span class="icon emoji">${esc(it.icon || '✨')}</span>
      <span class="meta">
        <span class="title">${esc(it.title)}</span>
        <span class="sub">${esc(it.sub || '')}</span>
      </span>
      ${it.tag ? `<span class="tag">${esc(it.tag)}</span>` : ''}`;
    return it.url
      ? `<a class="card" href="${esc(it.url)}" target="_blank" rel="noopener" aria-label="${esc(it.title)}">${inner}</a>`
      : `<div class="card">${inner}</div>`;
  }).join("");
  const label = up.label ? `<div class="section-label">${esc(up.label)}</div>` : "";
  $("updates").innerHTML = label + items;
} else {
  $("updates").remove();
}

// Newsletter
const nl = CONFIG.newsletter;
if (nl && nl.enabled) {
  $("newsletter").innerHTML = `
    <div class="nl-card">
      <div class="nl-head">${esc(nl.heading)}</div>
      <div class="nl-sub">${esc(nl.sub)}</div>
      <form class="nl-form" id="nl-form" novalidate>
        <input class="nl-input" id="nl-email" type="email" name="email" inputmode="email"
               autocomplete="email" placeholder="${esc(nl.placeholder || 'you@email.com')}"
               aria-label="Email address" required>
        <button class="nl-btn" type="submit">${esc(nl.buttonText || 'Subscribe')}</button>
      </form>
      <div class="nl-msg" id="nl-msg" role="status" aria-live="polite"></div>
    </div>`;
  const form = $("nl-form"), msg = $("nl-msg"), btn = form.querySelector(".nl-btn"), input = $("nl-email");
  const setMsg = (t, kind) => { msg.textContent = t; msg.className = "nl-msg" + (kind ? " " + kind : ""); };
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = input.value.trim();
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { setMsg("Please enter a valid email address.", "err"); return; }
    btn.disabled = true; const label = btn.textContent; btn.textContent = "…";
    try {
      const r = await fetch(nl.endpoint, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ email }),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && data.ok) { form.reset(); setMsg("You're on the list — thanks! 🎉", "ok"); }
      else { setMsg(data.error || "Something went wrong. Please try again.", "err"); }
    } catch {
      setMsg("Network error. Please try again.", "err");
    } finally {
      btn.disabled = false; btn.textContent = label;
    }
  });
} else {
  $("newsletter").remove();
}

// App cards
$("links").innerHTML = CONFIG.sections.map(sec => {
  const cards = (sec.apps || []).map(app => {
    const store = storeFor(app);
    const iconInner = app.icon
      ? `<img src="${esc(app.icon)}" alt="${esc(app.title)} icon" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentNode.textContent=this.alt.charAt(0)">`
      : esc(app.title.charAt(0));
    const rating = app.rating ? `<span class="rating">${icon('star')}${esc(app.rating)}</span>` : "";
    return `<a class="card" href="${esc(store.url)}" target="_blank" rel="noopener" aria-label="${esc(app.title)} on ${store.label}">
      <span class="icon">${iconInner}</span>
      <span class="meta">
        <span class="title">${esc(app.title)}${rating}</span>
        <span class="sub">${esc(app.sub || '')}</span>
      </span>
      <span class="store">${icon(store.badge)}<span class="store-label">${store.label}</span></span>
    </a>`;
  }).join("");
  const label = sec.label ? `<div class="section-label">${esc(sec.label)}</div>` : "";
  return label + cards;
}).join("");

// Buy me a coffee
const cf = CONFIG.coffee;
if (cf && cf.enabled && cf.url) {
  $("coffee").innerHTML =
    `<a href="${esc(cf.url)}" target="_blank" rel="noopener" aria-label="Buy me a coffee">` +
    `<img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy me a coffee" loading="lazy"></a>`;
} else {
  $("coffee").remove();
}

// Footer
$("footer").innerHTML = CONFIG.footerText;
</script>
</body>
</html>
